<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="asg0.css" />
    <title>CSE 160 Assignment 0 - bbalamur</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <div class="vectInput">
      <div>
        <b>V1: </b>
        <div class="vectInput">
          x: <input id="v1x" type="number" /> 
          y: <input id="v1y" type="number" />
        </div>
      </div>
      <div>
        <b>V2: </b>
        <div class="vectInput">
          x: <input id="v2x" type="number" /> 
          y: <input id="v2y" type="number" />
        </div>
      </div>
      <button onclick="handleDrawEvent()">Draw</button>
    </div>
    <div class="operation">
      <b>Operation: </b>
      <select name="operations" id="op">
        <option value="add">Add</option>
        <option value="ang">Angle between</option>
        <option value="area">Area</option>
        <option value="div">Divide</option>
        <option value="mag">Magnitude</option>
        <option value="mult">Multiply</option>
        <option value="norm">Normalize</option>
        <option value="sub">Subtract</option>
      </select>
      <b>Scalar: </b>
      <input type="number" id="scalar">
    </div>
    <div>
      <button onclick="handleDrawOpEvent()">Draw</button>
    </div>
    <script src="asg0.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
  </body>
</html>
